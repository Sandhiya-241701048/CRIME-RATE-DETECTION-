<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Filter by Location — Crime Rate Detection</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <h2 class="page-title">Filter by Location</h2>
    <p class="page-subtitle">View crime data for a specific city</p>

    <!-- Filter -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-body">
        <div class="filter-bar">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">Select Location</label>
            <select id="location-select">
              <option value="">-- Choose a city --</option>
            </select>
          </div>
          <button class="btn-primary" onclick="filterByLocation()" style="width:auto;padding:10px 20px;">🔍 Search</button>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="results-section" class="hidden">
      <!-- Safety Score + Stats -->
      <div style="display:grid;grid-template-columns:auto 1fr;gap:20px;margin-bottom:24px;align-items:start;">
        <div class="card" style="margin:0;">
          <div class="card-body" style="text-align:center;padding:28px 32px;">
            <div class="score-circle" id="score-circle">
              <span class="score-val" id="score-val">—</span>
              <span class="score-label">Score</span>
            </div>
            <p id="risk-level" style="margin-top:12px;font-weight:600;"></p>
          </div>
        </div>
        <div class="stats-grid" style="margin:0;">
          <div class="stat-card danger">  <div class="label">Total Crimes</div> <div class="value" id="r-total">—</div></div>
          <div class="stat-card info">    <div class="label">Records Found</div><div class="value" id="r-count">—</div></div>
        </div>
      </div>

      <!-- Crime Type Breakdown -->
      <div class="card" style="margin-bottom:24px;">
        <div class="card-header"><h3>Crime Type Breakdown</h3></div>
        <div class="card-body"><div class="bar-chart" id="type-chart"></div></div>
      </div>

      <!-- Records Table -->
      <div class="card">
        <div class="card-header"><h3 id="table-title">Crime Records</h3></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>District</th><th>Crime Type</th><th>Date</th><th>Hour</th><th>Count</th></tr></thead>
            <tbody id="records-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="no-results" class="hidden" style="text-align:center;padding:48px;color:var(--muted);">
      <p style="font-size:40px">🔍</p>
      <p style="margin-top:12px;font-size:15px">No records found for this location.</p>
    </div>
  </main>
</div>

<script src="../js/common.js"></script>
<script>
  initPage("location");

  async function loadLocations() {
    const res  = await fetch(`${API}/api/analysis/summary`, { credentials: "include" });
    const data = await res.json();
    const sel  = document.getElementById("location-select");
    data.locations.forEach(loc => {
      const opt = document.createElement("option");
      opt.value = opt.textContent = loc;
      sel.appendChild(opt);
    });
  }

  async function filterByLocation() {
    const location = document.getElementById("location-select").value;
    if (!location) { alert("Please select a location."); return; }

    // Analysis
    const res  = await fetch(`${API}/api/analysis/filter/location?location=${encodeURIComponent(location)}`, { credentials: "include" });
    const data = await res.json();

    // Safety score
    const sr   = await fetch(`${API}/api/alerts/safety-score?location=${encodeURIComponent(location)}`, { credentials: "include" });
    const sd   = await sr.json();

    document.getElementById("results-section").classList.remove("hidden");
    document.getElementById("no-results").classList.add("hidden");

    // Score circle
    const cls = scoreCircleClass(sd.risk_level);
    const sc  = document.getElementById("score-circle");
    sc.className = `score-circle ${cls}`;
    document.getElementById("score-val").textContent  = sd.score;
    document.getElementById("risk-level").innerHTML   = riskBadge(sd.risk_level);

    document.getElementById("r-total").textContent = data.total;
    document.getElementById("r-count").textContent = data.count;
    document.getElementById("table-title").textContent = `Crime Records — ${location}`;

    // Type chart
    const byType = {};
    data.results.forEach(r => { byType[r.type] = (byType[r.type]||0) + r.count; });
    const max = Math.max(...Object.values(byType), 1);
    document.getElementById("type-chart").innerHTML = Object.entries(byType).map(([type, count]) => `
      <div class="bar-row">
        <div class="bar-label">${type}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.round(count/max*100)}%;background:var(--danger)">
            <span>${count}</span>
          </div>
        </div>
      </div>`).join("");

    // Table
    document.getElementById("records-body").innerHTML = data.results.length
      ? data.results.map(r => `
          <tr>
            <td>${r.id}</td>
            <td>${r.district}</td>
            <td>${r.type}</td>
            <td>${r.date}</td>
            <td>${r.hour}:00</td>
            <td><strong>${r.count}</strong></td>
          </tr>`).join("")
      : `<tr><td colspan="6" style="text-align:center;color:var(--muted)">No records found.</td></tr>`;
  }

  loadLocations();
</script>
</body>
</html>
