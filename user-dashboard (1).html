<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Crime Rate Detection</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <h2 class="page-title">Crime Overview Dashboard</h2>
    <p class="page-subtitle" id="refresh-note">Auto-refreshes every 30 seconds</p>

    <div class="stats-grid">
      <div class="stat-card danger">  <div class="label">Total Crimes</div>   <div class="value" id="s-total">—</div>  <div class="sub">all records</div></div>
      <div class="stat-card warning"> <div class="label">Locations</div>       <div class="value" id="s-locs">—</div>   <div class="sub">cities tracked</div></div>
      <div class="stat-card info">    <div class="label">Crime Types</div>     <div class="value" id="s-types">—</div>  <div class="sub">categories</div></div>
      <div class="stat-card success"> <div class="label">Peak Hour</div>       <div class="value" id="s-peak" style="font-size:18px">—</div> <div class="sub">highest activity</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <!-- Crimes by Type -->
      <div class="card">
        <div class="card-header"><h3>Crimes by Type</h3></div>
        <div class="card-body"><div class="bar-chart" id="type-chart"></div></div>
      </div>
      <!-- Crimes by Location -->
      <div class="card">
        <div class="card-header"><h3>Crimes by Location</h3></div>
        <div class="card-body"><div class="bar-chart" id="loc-chart"></div></div>
      </div>
    </div>

    <!-- Monthly Trend -->
    <div class="card" style="margin-bottom:24px;">
      <div class="card-header"><h3>Monthly Crime Trend</h3></div>
      <div class="card-body"><div class="bar-chart" id="month-chart"></div></div>
    </div>

    <!-- Records Table -->
    <div class="card">
      <div class="card-header">
        <h3>All Crime Records</h3>
        <span id="rec-count" style="font-size:13px;color:var(--muted)"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Location</th><th>District</th><th>Crime Type</th><th>Date</th><th>Count</th></tr></thead>
          <tbody id="records-body"><tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="../js/common.js"></script>
<script>
  initPage("dashboard");

  function makeBarChart(containerId, data, labelKey, valueKey, color) {
    const max = Math.max(...data.map(d => d[valueKey]), 1);
    document.getElementById(containerId).innerHTML = data.map(d => `
      <div class="bar-row">
        <div class="bar-label">${d[labelKey]}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.round(d[valueKey]/max*100)}%;background:${color||'var(--primary)'}">
            <span>${d[valueKey]}</span>
          </div>
        </div>
      </div>`).join("");
  }

  async function loadDashboard() {
    try {
      const res  = await fetch(`${API}/api/reports/dashboard-stats`, { credentials: "include" });
      const data = await res.json();

      document.getElementById("s-total").textContent  = data.total_crimes;
      document.getElementById("s-locs").textContent   = data.total_locations;
      document.getElementById("s-types").textContent  = data.by_type.length;
      document.getElementById("s-peak").textContent   = data.peak_hour;

      makeBarChart("type-chart",  data.by_type,     "type",     "count", "#e02424");
      makeBarChart("loc-chart",   data.by_location, "location", "count", "#1a56db");
      makeBarChart("month-chart", data.by_month,    "month",    "count", "#057a55");

      // Records table
      const recs = await fetch(`${API}/api/analysis/records`, { credentials: "include" });
      const rd   = await recs.json();
      document.getElementById("rec-count").textContent = `${rd.records.length} records`;
      document.getElementById("records-body").innerHTML = rd.records.map(r => `
        <tr>
          <td>${r.id}</td>
          <td><strong>${r.location}</strong></td>
          <td>${r.district}</td>
          <td>${r.type}</td>
          <td>${r.date}</td>
          <td><strong>${r.count}</strong></td>
        </tr>`).join("");
    } catch(e) {
      document.getElementById("records-body").innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--danger)">Failed to load. Make sure backend is running.</td></tr>`;
    }
    document.getElementById("refresh-note").textContent = "Last updated: " + new Date().toLocaleTimeString();
  }

  loadDashboard();
  setInterval(loadDashboard, 30000);
</script>
</body>
</html>
